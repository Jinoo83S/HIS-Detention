<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>디텐션 관리</title>

  <link rel="stylesheet" href="common.css">
</head>

<body>

<div id="toast"></div>

<h2>디텐션 관리 (Teacher)</h2>

<div>
  <button onclick="loadData()">새로고침</button>
  <button onclick="logoutTeacher()">로그아웃</button>
</div>

<hr>

<!-- 학생 선택 -->
<div>
  <input id="student-search-input" list="student-list" placeholder="학생 검색">
  <datalist id="student-list"></datalist>
</div>

<!-- 카테고리 -->
<div>
  <select id="category-select"></select>
  <select id="violation-select"></select>
</div>

<!-- 점수 -->
<div>
  자동점수: <span id="auto-points">-</span>
</div>

<div>
  수동점수: <input id="manual-points" type="number" value="0">
</div>

<button onclick="saveDetention()">저장</button>

<hr>

<h3>전체 기록</h3>

<table border="1">
  <thead>
    <tr>
      <th>학생</th>
      <th>위반</th>
      <th>점수</th>
      <th>상태</th>
      <th>회복</th>
    </tr>
  </thead>
  <tbody id="all-records-tbody"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/common.js"></script>

<script type="module">

import { addDetention, checkCommittee } from './js/services/detentionEngine.js';
import { completeRecovery } from './js/services/recoveryManager.js';

const DETENTION_DB_PATH = 'detentionEntries';
const DETENTION_STANDARD_PATH = 'detentionStandards';

let detentionStandards = {};
let students = {};
let entries = {};
let states = {};
let studentSearchMap = {};
let currentUser = null;

// 초기화
function init(){
  currentUser = requireTeacherSession();
  if (!currentUser) return;

  loadData();
}

// 데이터 로드
async function loadData(){

  const [studentSnap, entrySnap, standardSnap, stateSnap] = await Promise.all([
    db.ref('students').once('value'),
    db.ref(DETENTION_DB_PATH).once('value'),
    db.ref(DETENTION_STANDARD_PATH).once('value'),
    db.ref('studentStates').once('value')
  ]);

  students = studentSnap.val() || {};
  entries = entrySnap.val() || {};
  detentionStandards = standardSnap.val() || {};
  states = stateSnap.val() || {};

  renderStudentOptions();
  renderCategoryOptions();
  renderAllEntries();
}

// 학생 목록
function renderStudentOptions(){
  const dataList = document.getElementById('student-list');
  studentSearchMap = {};

  dataList.innerHTML = Object.entries(students).map(([key, s])=>{
    const label = `${s.name}`;
    studentSearchMap[label] = key;
    return `<option value="${label}">`;
  }).join('');
}

// 카테고리
function renderCategoryOptions(){
  const categorySelect = document.getElementById('category-select');

  const categories = [...new Set(Object.values(detentionStandards).map(s => s.category))];

  categorySelect.innerHTML = categories.map(c=>`<option value="${c}">${c}</option>`).join('');

  categorySelect.onchange = renderViolationOptions;
  renderViolationOptions();
}

// 위반 선택
function renderViolationOptions(){
  const category = document.getElementById('category-select').value;
  const violationSelect = document.getElementById('violation-select');

  const filtered = Object.entries(detentionStandards)
    .filter(([_, s]) => s.category === category);

  violationSelect.innerHTML = filtered.map(([key, s]) =>
    `<option value="${key}">${s.violation}</option>`
  ).join('');

  violationSelect.onchange = updateAutoPoints;
  updateAutoPoints();
}

// 자동 점수 표시
function updateAutoPoints(){
  const standardId = document.getElementById('violation-select').value;
  const s = detentionStandards[standardId];

  let text = "-";

  if (!s) return;

  if (s.type === "fixed") text = s.fixedPoints;
  if (s.type === "range") text = `${s.range.min}~${s.range.max}`;
  if (s.type === "progressive") text = `${s.progressive.first}/${s.progressive.repeat}`;

  document.getElementById('auto-points').innerText = text;
}

// 🔥 핵심: 상태 표시 + 이름 표시 + 위원회 표시
function renderAllEntries(){
  const tb = document.getElementById('all-records-tbody');

  tb.innerHTML = Object.values(entries).map(e=>{

    const student = students[e.studentKey];
    const standard = detentionStandards[e.standardId];
    const state = states[e.studentKey] || {};

    const studentName = student ? student.name : e.studentKey;
    const violation = standard ? standard.violation : e.standardId;

    const committee = checkCommittee(state);

    let status = "정상";

    if (committee) {
      status = committee;
    } else if ((state.cyclePoints || 0) >= 3) {
      status = "디텐션";
    }

    return `
      <tr>
        <td>${studentName}</td>
        <td>${violation}</td>
        <td>${e.points}</td>
        <td>${status}</td>
        <td>
          <button onclick="handleRecovery('${e.studentKey}')">
            회복교육
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

// 저장
async function saveDetention(){

  const name = document.getElementById('student-search-input').value;
  const studentKey = studentSearchMap[name];

  if(!studentKey){
    return alert('학생 선택');
  }

  const standardId = document.getElementById('violation-select').value;
  const manualPoints = Number(document.getElementById('manual-points').value || 0);

  try {

    await addDetention({
      studentKey,
      standardId,
      manualPoints,
      teacher: currentUser.name
    });

    alert('저장 완료');

    loadData();

  } catch (e) {
    console.error(e);
    alert('저장 오류');
  }
}

// 회복교육
async function handleRecovery(studentKey){

  try {
    const result = await completeRecovery(studentKey);

    alert(`회복교육 완료\n${result.before} → ${result.after}`);

    loadData();

  } catch(e){
    alert(e.message);
  }
}

init();

</script>

</body>
</html>
