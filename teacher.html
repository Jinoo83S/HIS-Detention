<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>교사 페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet"><link rel="stylesheet" href="common.css"></head>
<body><div id="toast"></div>
<div class="topbar"><div><h1>학생 벌점 관리 시스템</h1><div class="sub" id="teacher-sub">교사 페이지</div></div><div class="inline-actions"><button class="btn btn-secondary" onclick="loadData()">새로고침</button><button class="btn btn-danger" onclick="logoutTeacher()">로그아웃</button></div></div>
<div class="content">
<div class="card"><div class="card-title">교사 정보</div><div id="teacher-info"></div></div>
<div class="card">
  <div class="card-title">학생 선택 및 벌점 입력</div>
  <div class="filter-bar"><input id="student-search" class="edit-input flex1" placeholder="학생명/영문명/학반 검색"><select id="cat" class="edit-input"></select><input id="pts" class="edit-input" type="number" min="1" style="width:90px"><button class="btn btn-primary" onclick="saveRecord()">벌점 등록</button></div>
  <textarea id="reason" class="edit-input" placeholder="사유 입력"></textarea>
  <div style="margin-top:10px"><span class="badge" id="selected-student">학생을 선택해 주세요</span></div>
  <div class="tbl-wrap" style="margin-top:12px;max-height:380px"><table><thead><tr><th>선택</th><th>학생 이름</th><th>영문 이름</th><th>학반</th></tr></thead><tbody id="student-tbody"></tbody></table></div>
</div>
<div class="card"><div class="card-title">최근 기록</div><div class="tbl-wrap"><table><thead><tr><th>학생</th><th>학반</th><th>항목</th><th>점수</th><th>사유</th><th>일시</th></tr></thead><tbody id="record-tbody"></tbody></table></div></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script><script src="common.js"></script>
<script>
const categories=[{label:'지각',points:1},{label:'복장 불량',points:1},{label:'수업 방해',points:2},{label:'무단 결석',points:3},{label:'기타',points:1}];
let teacher=null, students={}, records={}, selectedKey='';
function fmt(v){const d=new Date(v||''); return isNaN(d)?'-':d.toLocaleString('ko-KR');}
function init(){teacher=requireTeacherSession(); if(!teacher) return; document.getElementById('teacher-sub').textContent=`${teacher.name} · ${teacher.role}${teacher.homeroom?' · '+teacher.homeroom:''}`; document.getElementById('teacher-info').innerHTML=`<span class="badge">${esc(teacher.name)}</span> <span class="badge">${esc(teacher.email)}</span> <span class="badge">${esc(teacher.role)}</span> ${teacher.homeroom?`<span class="badge">${esc(teacher.homeroom)}</span>`:''}`; document.getElementById('cat').innerHTML=categories.map(c=>`<option value="${esc(c.label)}">${esc(c.label)}</option>`).join(''); document.getElementById('pts').value=categories[0].points; document.getElementById('cat').addEventListener('change',()=>{const f=categories.find(c=>c.label===document.getElementById('cat').value); document.getElementById('pts').value=f?f.points:1;}); document.getElementById('student-search').addEventListener('input',renderStudents); loadData();}
async function loadData(){try{const [sSnap,rSnap]=await Promise.all([db.ref('students').once('value'), db.ref('detentionRecords').once('value')]); students=sSnap.val()||{}; records=rSnap.val()||{}; renderStudents(); renderRecords();}catch(e){console.error(e);toast('데이터를 불러오지 못했습니다.','err');}}
function renderStudents(){const q=(document.getElementById('student-search').value||'').trim().toLowerCase(); const list=Object.entries(students).map(([key,v])=>({key,...v})).filter(s=>!q||[s.name,s.englishName,s.className].some(v=>String(v||'').toLowerCase().includes(q))).sort((a,b)=>String(a.className||'').localeCompare(String(b.className||''))||String(a.name||'').localeCompare(String(b.name||''))); const tb=document.getElementById('student-tbody'); if(!list.length){tb.innerHTML='<tr><td colspan="4" class="empty">학생이 없습니다.</td></tr>'; return;} tb.innerHTML=list.map(s=>`<tr><td><button class="btn ${selectedKey===s.key?'btn-primary':'btn-secondary'}" onclick="pickStudent('${esc(s.key)}')">${selectedKey===s.key?'선택됨':'선택'}</button></td><td>${esc(s.name||'')}</td><td>${esc(s.englishName||'-')}</td><td>${esc(s.className||'-')}</td></tr>`).join('');}
function pickStudent(key){selectedKey=key; const s=students[key]; document.getElementById('selected-student').textContent=s?`${s.name} / ${s.className||'-'}`:'학생을 선택해 주세요'; renderStudents();}
function renderRecords(){const list=Object.values(records).filter(r=>(r.teacherEmail||'')===teacher.email).sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||''))).slice(0,50); const tb=document.getElementById('record-tbody'); if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">기록이 없습니다.</td></tr>'; return;} tb.innerHTML=list.map(r=>`<tr><td>${esc(r.studentName||'')}</td><td>${esc(r.className||'-')}</td><td>${esc(r.category||'')}</td><td>${Number(r.points||0)}</td><td>${esc(r.reason||'')}</td><td>${fmt(r.createdAt)}</td></tr>`).join('');}
async function saveRecord(){if(!selectedKey||!students[selectedKey]) return toast('학생을 먼저 선택해 주세요.','err'); const s=students[selectedKey]; const payload={studentKey:selectedKey,studentName:s.name||'',englishName:s.englishName||'',className:s.className||'',teacherName:teacher.name||'',teacherEmail:teacher.email||'',teacherRole:teacher.role||'general',category:document.getElementById('cat').value,points:Number(document.getElementById('pts').value||1),reason:(document.getElementById('reason').value||'').trim(),canceled:false,createdAt:new Date().toISOString()}; try{await db.ref('detentionRecords').push(payload); document.getElementById('reason').value=''; toast('벌점이 등록되었습니다.','ok'); loadData();}catch(e){console.error(e);toast('벌점 등록에 실패했습니다.','err');}}
init();
</script></body></html>
