<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>디텐션 관리 (Teacher)</title>

<link rel="stylesheet" href="common.css">

<style>
body{font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:8px;text-align:left}
th{background:#f5f5f5}
</style>
</head>

<body>

<h2>디텐션 관리 (Teacher)</h2>

<button onclick="loadData()">새로고침</button>
<button onclick="logoutTeacher()">로그아웃</button>

<hr>

<!-- 학생 선택 -->
<input id="student-search-input" list="student-list" placeholder="학생 검색">
<datalist id="student-list"></datalist>

<!-- 카테고리 -->
<select id="category-select"></select>
<select id="violation-select"></select>

<br><br>

자동점수: <span id="auto-points">-</span><br>
수동점수: <input id="manual-points" type="number" value="0">

<br><br>

<textarea id="memo" placeholder="메모"></textarea>

<br><br>

<button onclick="saveDetention()">저장</button>

<hr>

<h3>전체 기록</h3>
<table>
<thead>
<tr>
<th>학생</th>
<th>위반</th>
<th>점수</th>
<th>상태</th>
<th>회복</th>
</tr>
</thead>
<tbody id="all-records-tbody"></tbody>
</table>

<hr>

<h3>디텐션 알림</h3>
<table>
<thead>
<tr>
<th>학생</th>
<th>점수</th>
<th>잔류</th>
<th>상태</th>
</tr>
</thead>
<tbody id="notice-tbody"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/common.js"></script>

<script type="module">

import { addDetention } from './js/services/detentionEngine.js';
import { completeRecovery } from './js/services/recoveryManager.js';

const DETENTION_DB_PATH = 'detentionEntries';
const STANDARD_PATH = 'detentionStandards';
const NOTICE_PATH = 'detentionNotices';

let students = {};
let standards = {};
let entries = {};
let notices = {};
let studentMap = {};
let currentUser = null;

// 초기화
function init(){
  currentUser = requireTeacherSession();
  if(!currentUser) return;
  loadData();
}

// 데이터 로드
async function loadData(){

  const [sSnap,eSnap,stdSnap,nSnap] = await Promise.all([
    db.ref('students').once('value'),
    db.ref(DETENTION_DB_PATH).once('value'),
    db.ref(STANDARD_PATH).once('value'),
    db.ref(NOTICE_PATH).once('value')
  ]);

  students = sSnap.val() || {};
  entries = eSnap.val() || {};
  notices = nSnap.val() || {};

  const raw = stdSnap.val() || {};
  standards = raw;

  renderStudentList();
  renderCategory();
  renderAll();
  renderNotice();
}

// 학생 목록
function renderStudentList(){
  const list = document.getElementById('student-list');
  studentMap = {};

  list.innerHTML = Object.entries(students).map(([k,s])=>{
    const label = `${s.name}`;
    studentMap[label] = k;
    return `<option value="${label}">`;
  }).join('');
}

// 카테고리
function renderCategory(){
  const sel = document.getElementById('category-select');
  const categories = [...new Set(Object.values(standards).map(s=>s.category))];

  sel.innerHTML = categories.map(c=>`<option>${c}</option>`).join('');

  sel.onchange = renderViolation;
  renderViolation();
}

// 위반
function renderViolation(){
  const cat = document.getElementById('category-select').value;
  const sel = document.getElementById('violation-select');

  const list = Object.entries(standards)
    .filter(([k,v])=>v.category===cat);

  sel.innerHTML = list.map(([k,v])=>
    `<option value="${k}">${v.violation}</option>`
  ).join('');

  sel.onchange = updateAuto;
  updateAuto();
}

// 자동점수
function updateAuto(){
  const id = document.getElementById('violation-select').value;
  const s = standards[id];
  if(!s) return;

  let text = "-";

  if(s.type==="fixed") text = s.fixedPoints;
  if(s.type==="range") text = `${s.range.min}~${s.range.max}`;
  if(s.type==="progressive") text = `${s.progressive.first}/${s.progressive.repeat}`;

  document.getElementById('auto-points').innerText = text;
}

// 저장
async function saveDetention(){

  const name = document.getElementById('student-search-input').value;
  const studentKey = studentMap[name];

  if(!studentKey){
    return alert("학생 선택");
  }

  const standardId = document.getElementById('violation-select').value;
  const manualPoints = Number(document.getElementById('manual-points').value || 0);

  await addDetention({
    studentKey,
    standardId,
    manualPoints,
    teacher: currentUser.name
  });

  alert("저장 완료");
  loadData();
}

// 전체 기록
function renderAll(){
  const tb = document.getElementById('all-records-tbody');

  tb.innerHTML = Object.values(entries).map(e=>`
    <tr>
      <td>${e.studentKey}</td>
      <td>${e.standardId}</td>
      <td>${e.points}</td>
      <td style="color:${e.status==='active'?'red':'gray'}">
        ${e.status || '-'}
      </td>
      <td>
        <button onclick="handleRecovery('${e.studentKey}')">
          회복
        </button>
      </td>
    </tr>
  `).join('');
}

// 알림
function renderNotice(){
  const tb = document.getElementById('notice-tbody');

  tb.innerHTML = Object.values(notices).map(n=>`
    <tr>
      <td>${n.studentKey}</td>
      <td>${n.totalPoints}</td>
      <td>${n.carryOverAfter}</td>
      <td style="color:${n.status==='active'?'red':'gray'}">
        ${n.status}
      </td>
    </tr>
  `).join('');
}

// 회복
async function handleRecovery(studentKey){
  const res = await completeRecovery(studentKey);
  alert(`${res.before} → ${res.after}`);
  loadData();
}

init();

</script>

</body>
</html>
