<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>디텐션 관리</title>

  <link rel="stylesheet" href="common.css">
</head>

<body>

<div id="toast"></div>

<h2>디텐션 관리 (Teacher)</h2>

<div>
  <button onclick="loadData()">새로고침</button>
  <button onclick="logoutTeacher()">로그아웃</button>
</div>

<hr>

<!-- 학생 선택 -->
<div>
  <input id="student-search-input" list="student-list" placeholder="학생 검색">
  <datalist id="student-list"></datalist>
</div>

<!-- 카테고리 -->
<div>
  <select id="category-select"></select>
  <select id="violation-select"></select>
</div>

<!-- 점수 -->
<div>
  자동점수: <span id="auto-points">-</span>
</div>

<div>
  수동점수: <input id="manual-points" type="number" value="0">
</div>

<!-- 메모 -->
<div>
  <textarea id="memo" placeholder="메모"></textarea>
</div>

<button onclick="saveDetention()">저장</button>

<hr>

<h3>최근 기록</h3>
<div id="recent-entry-list"></div>

<hr>

<h3>기준표</h3>
<table border="1">
  <thead>
    <tr>
      <th>구분</th>
      <th>위반</th>
      <th>점수</th>
    </tr>
  </thead>
  <tbody id="criteria-tbody"></tbody>
</table>

<hr>

<h3>전체 기록</h3>
<table border="1">
  <thead>
    <tr>
      <th>학생</th>
      <th>위반</th>
      <th>점수</th>
      <th>상태</th>
    </tr>
  </thead>
  <tbody id="all-records-tbody"></tbody>
</table>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- 🔥 반드시 이 순서 -->
<script src="js/firebase.js"></script>
<script src="js/common.js"></script>

<script>

const DETENTION_DB_PATH = 'detentionEntries';
const DETENTION_STANDARD_PATH = 'detentionStandards';

let detentionStandards = [];
let students = {};
let entries = {};
let selectedStudentKey = '';
let studentSearchMap = {};

// 초기화
function init(){
  const teacher = requireTeacherSession();
  if (!teacher) return;

  loadData();
}

// 데이터 로드
async function loadData(){
  const [studentSnap, entrySnap, standardSnap] = await Promise.all([
    db.ref('students').once('value'),
    db.ref(DETENTION_DB_PATH).once('value'),
    db.ref(DETENTION_STANDARD_PATH).once('value')
  ]);

  students = studentSnap.val() || {};
  entries = entrySnap.val() || {};
  detentionStandards = standardSnap.val() || [];

  renderStudentOptions();
  renderCriteriaTable();
  renderAllEntries();
}

// 학생 목록
function renderStudentOptions(){
  const dataList = document.getElementById('student-list');
  studentSearchMap = {};

  dataList.innerHTML = Object.entries(students).map(([key, s])=>{
    const label = `${s.name}`;
    studentSearchMap[label] = key;
    return `<option value="${label}">`;
  }).join('');
}

// 기준표
function renderCriteriaTable(){
  const tb = document.getElementById('criteria-tbody');

  tb.innerHTML = detentionStandards.map(s=>`
    <tr>
      <td>${s.category}</td>
      <td>${s.violation}</td>
      <td>${s.autoPoints}</td>
    </tr>
  `).join('');
}

// 전체 기록
function renderAllEntries(){
  const tb = document.getElementById('all-records-tbody');

  tb.innerHTML = Object.values(entries).map(e=>`
    <tr>
      <td>${e.studentName}</td>
      <td>${e.violation}</td>
      <td>${e.totalPoints}</td>
      <td>${e.status}</td>
    </tr>
  `).join('');
}

// 저장
async function saveDetention(){
  const name = document.getElementById('student-search-input').value;
  const studentKey = studentSearchMap[name];

  if(!studentKey){
    return alert('학생 선택');
  }

  const payload = {
    studentKey,
    studentName: name,
    violation: document.getElementById('violation-select').value,
    totalPoints: Number(document.getElementById('manual-points').value),
    memo: document.getElementById('memo').value,
    status: '임시저장',
    createdAt: new Date().toISOString()
  };

  await db.ref(DETENTION_DB_PATH).push(payload);

  alert('저장 완료');
  loadData();
}

init();

</script>

</body>
</html>
