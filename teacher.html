
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detention</title>
</head>
<body>

<h2>Detention Entry</h2>

<select id="student"></select>
<input id="points" type="number">
<button onclick="save()">Save</button>

<hr>

<h3>Records</h3>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="common.js"></script>

<script>
let students = {};
let entries = {};

async function init(){
  const s = await db.ref("students").once("value");
  students = s.val() || {};

  const e = await db.ref("entries").once("value");
  entries = e.val() || {};

  renderStudents();
  renderEntries();
}

function renderStudents(){
  const sel = document.getElementById("student");
  sel.innerHTML = Object.entries(students)
    .map(([id,s])=>`<option value="${id}">${s.name}</option>`)
    .join("");
}

function renderEntries(){
  const div = document.getElementById("list");
  div.innerHTML = Object.values(entries)
    .map(e=>`<div>${e.studentName} - ${e.points}</div>`)
    .join("");
}

async function save(){
  const sid = student.value;
  const pts = Number(points.value);

  const s = students[sid];

  const id = db.ref().child("entries").push().key;

  await db.ref("entries/"+id).set({
    id,
    studentId:sid,
    studentName:s.name,
    points:pts,
    createdAt:new Date().toISOString()
  });

  alert("saved");
  init();
}

init();
</script>

</body>
</html>
