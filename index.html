<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>교사 로그인 | Teacher Login</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="common.css" />
</head>

<body>
  <div id="toast"></div>

  <a class="admin-link" href="admin.html">⚙️ 관리자 | Admin</a>

  <div class="login-page">
    <div class="login-box">
      <div class="icon">🧑‍🏫</div>

      <h1 style="text-align:center;">
        교사 로그인
        <span class="title-en">Teacher Login</span>
      </h1>

      <p>
        <span class="desc-ko">교사를 선택하고 비밀번호를 입력해 주세요.</span>
        <span class="desc-en">Please select a teacher and enter the password.</span>
      </p>

      <div class="grid">
        <div>
          <label class="label">교사 선택 | Teacher</label>

          <input
            id="teacher-search"
            class="edit-input"
            list="teacher-list"
            placeholder="교사 이름 검색"
            oninput="syncTeacherSelection()"
            onkeydown="if(event.key === 'Enter') login()"
          />

          <datalist id="teacher-list"></datalist>
        </div>

        <div>
          <label class="label">비밀번호 | Password</label>
          <input
            id="pw"
            type="password"
            class="edit-input"
            placeholder="비밀번호"
            onkeydown="if(event.key === 'Enter') login()"
          />
        </div>

        <button class="btn btn-primary" onclick="login()">로그인</button>
      </div>
    </div>
  </div>

  <!-- 🔥 Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <!-- 🔥 반드시 추가 -->
  <script src="js/firebase.js"></script>
  <script src="js/common.js"></script>

  <script>
    let teachers = {};
    let teacherSearchMap = {};

    async function init() {
      try {
        const snap = await db.ref('teachers').once('value');
        teachers = snap.val() || {};
        renderTeachers();
      } catch (e) {
        console.error(e);
        toast('교사 목록 로드 실패', 'err');
      }
    }

    function renderTeachers() {
      const list = Object.values(teachers)
        .filter(t => t && t.active !== false)
        .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));

      const dataList = document.getElementById('teacher-list');
      teacherSearchMap = {};

      dataList.innerHTML = list.map(t => {
        const label = `${t.name} | ${t.email}`;
        teacherSearchMap[label] = t.email.toLowerCase();
        return `<option value="${label}"></option>`;
      }).join('');
    }

    function syncTeacherSelection() {
      const inputValue = document.getElementById('teacher-search').value.trim();
      return teacherSearchMap[inputValue] || '';
    }

    async function login() {
      const email = syncTeacherSelection();
      const pw = document.getElementById('pw').value.trim();

      if (!email || !pw) {
        return toast('교사와 비밀번호 입력', 'err');
      }

      const snap = await db.ref('teachers').once('value');

      let found = null;
      let key = '';

      snap.forEach(child => {
        const t = child.val();
        if (
          t.email.toLowerCase() === email &&
          t.password === pw
        ) {
          found = t;
          key = child.key;
        }
      });

      if (!found) {
        document.getElementById('pw').value = '';
        return toast('로그인 실패', 'err');
      }

      // 🔥 핵심 수정 (session → local)
      localStorage.setItem(
        'his_teacher',
        JSON.stringify({
          key,
          name: found.name,
          email: found.email,
          roles: found.roles || []
        })
      );

      location.href = 'teacher.html';
    }

    init();
  </script>
</body>
</html>
