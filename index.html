<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>교사 로그인 | Teacher Login</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="common.css" />

  <style>
    .admin-link {
      position: fixed;
      top: 14px;
      right: 14px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 8px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    .login-box {
      max-width: 460px;
    }

    .login-box .btn {
      width: 100%;
    }

    .title-en {
      display:block;
      margin-top:2px;
      font-size:.9em;
    }

    .desc-ko,
    .desc-en {
      display:block;
      text-align:center;
    }

    .desc-en {
      margin-top:2px;
    }

    .label-en {
      display:block;
      font-size:11px;
      color:var(--sb);
      margin-top:2px;
      font-weight:500;
    }
  </style>
</head>

<body>
  <div id="toast"></div>

  <a class="admin-link" href="admin.html">⚙️ 관리자 | Admin</a>

  <div class="login-page">
    <div class="login-box">
      <div class="icon">🧑‍🏫</div>

      <h1 style="text-align:center;">
        교사 로그인
        <span class="title-en">Teacher Login</span>
      </h1>

      <p>
        <span class="desc-ko">교사를 선택하고 비밀번호를 입력해 주세요.</span>
        <span class="desc-en">Please select a teacher and enter the password.</span>
      </p>

      <div class="grid">
        <div>
          <label class="label">
            교사 선택 | Teacher
            <span class="label-en">이름으로 검색할 수 있습니다.</span>
            <span class="label-en">You can search by teacher name.</span>
          </label>

          <input
            id="teacher-search"
            class="edit-input"
            list="teacher-list"
            placeholder="교사 이름 검색 / Search teacher name"
            oninput="syncTeacherSelection()"
            onkeydown="if(event.key === 'Enter') login()"
          />

          <datalist id="teacher-list"></datalist>
        </div>

        <div>
          <label class="label">
            비밀번호 | Password
          </label>
          <input
            id="pw"
            type="password"
            class="edit-input"
            placeholder="비밀번호 / Password"
            onkeydown="if(event.key === 'Enter') login()"
          />
        </div>

        <button class="btn btn-primary" onclick="login()">로그인 | Login</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="common.js"></script>

  <script>
    let teachers = {};
    let teacherSearchMap = {};

    async function init() {
      try {
        const snap = await db.ref('teachers').once('value');
        teachers = snap.val() || {};
        renderTeachers();
      } catch (e) {
        console.error(e);
        toast('교사 목록을 불러오지 못했습니다.\nFailed to load teacher list.', 'err');
      }
    }

    function renderTeachers() {
      const list = Object.values(teachers)
        .filter(t => t && t.active !== false)
        .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'ko'));

      const dataList = document.getElementById('teacher-list');
      teacherSearchMap = {};

      dataList.innerHTML = list.map(t => {
        const label = `${String(t.name || '').trim()} | ${String(t.email || '').trim()}`;
        teacherSearchMap[label] = String(t.email || '').trim().toLowerCase();
        return `<option value="${esc(label)}"></option>`;
      }).join('');
    }

    function syncTeacherSelection() {
      const inputValue = (document.getElementById('teacher-search').value || '').trim();
      return teacherSearchMap[inputValue] || '';
    }

    function normalizeRoles(roles) {
      if (Array.isArray(roles)) return roles.filter(Boolean);

      if (typeof roles === 'string') {
        return roles
          .split(/[|,]/)
          .map(v => String(v || '').trim().toLowerCase())
          .filter(Boolean);
      }

      return [];
    }

    async function login() {
      const selectedEmail = syncTeacherSelection();
      const pw = (document.getElementById('pw').value || '').trim();

      if (!selectedEmail || !pw) {
        return toast('교사와 비밀번호를 입력해 주세요.\nPlease select a teacher and enter the password.', 'err');
      }

      try {
        const snap = await db.ref('teachers').once('value');

        let found = null;
        let key = '';

        snap.forEach(child => {
          const t = child.val() || {};
          if (String(t.email || '').trim().toLowerCase() === selectedEmail) {
            found = t;
            key = child.key;
          }
        });

        if (!found) {
          document.getElementById('pw').value = '';
          return toast('아이디 또는 비밀번호가 올바르지 않습니다.\nInvalid teacher or password.', 'err');
        }

        // admin 판별: roles에 admin 포함 OR email/name에 admin/관리자 포함
        const roles = normalizeRoles(found.roles || found.role || []);
        const emailStr = String(found.email || '').toLowerCase();
        const nameStr  = String(found.name  || '').toLowerCase();
        const isAdmin  = roles.includes('admin')
                      || emailStr.includes('admin')
                      || nameStr.includes('admin')
                      || nameStr.includes('관리자');

        if (isAdmin) {
          // adminConfig/password 로 검증
          let adminPw = '1751';
          try {
            const adminSnap = await db.ref('adminConfig/password').once('value');
            if (adminSnap.val()) adminPw = adminSnap.val();
          } catch(e) { /* 기본값 사용 */ }

          if (pw !== adminPw) {
            document.getElementById('pw').value = '';
            return toast('아이디 또는 비밀번호가 올바르지 않습니다.\nInvalid teacher or password.', 'err');
          }
        } else {
          if (String(found.password || '') !== pw) {
            document.getElementById('pw').value = '';
            return toast('아이디 또는 비밀번호가 올바르지 않습니다.\nInvalid teacher or password.', 'err');
          }
        }

        sessionStorage.setItem(
          'his_teacher',
          JSON.stringify({
            key,
            name: found.name || '',
            email: found.email || '',
            roles: roles,
            homeroom: found.homeroom || ''
          })
        );

        location.href = 'teacher.html';
      } catch (e) {
        console.error(e);
        toast('로그인 중 오류가 발생했습니다.\nAn error occurred during login.', 'err');
      }
    }

    init();
  </script>
</body>
</html>
