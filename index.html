<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIS Detention</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div class="login-wrap" id="loginView">
        <div class="card login-card">
          <h1>HIS Detention</h1>
          <p>교사 계정으로 로그인해 주세요.</p>
          <button id="googleLoginBtn" class="btn primary">Google 로그인</button>
          <p class="help-text">
            Firebase Authentication에서 Google 로그인을 먼저 활성화해야 합니다.
          </p>
          <div id="loginMessage" class="message hidden"></div>
        </div>
      </div>

      <div id="mainView" class="hidden">
        <header class="topbar">
          <div>
            <h1>HIS Detention</h1>
            <p class="sub">GitHub Pages + Firebase</p>
          </div>
          <div class="topbar-right">
            <span id="userName" class="user-name"></span>
            <button id="logoutBtn" class="btn danger">로그아웃</button>
          </div>
        </header>

        <main class="layout">
          <section class="left-col">
            <div class="card">
              <div class="section-head">
                <h2>학생 검색</h2>
                <input id="searchInput" type="text" placeholder="이름 / 영문 이름 / 학반 검색" />
              </div>
              <div id="studentList" class="student-list"></div>
            </div>
          </section>

          <section class="right-col">
            <div class="card">
              <h2>학생 명단 업로드</h2>
              <p class="help-text">CSV 첫 줄은 반드시 <strong>name,englishName,className</strong> 여야 합니다.</p>
              <input id="csvFileInput" type="file" accept=".csv" />
              <div class="inline-actions">
                <button id="uploadCsvBtn" class="btn primary">CSV 업로드</button>
                <button id="downloadSampleBtn" class="btn">샘플 CSV 다운로드</button>
              </div>
              <div id="uploadMessage" class="message hidden"></div>
            </div>

            <div class="card">
              <h2>벌점 입력</h2>
              <div id="selectedStudentBox" class="selected-student empty">왼쪽에서 학생을 선택해 주세요.</div>
              <form id="penaltyForm" class="form-grid">
                <label>
                  <span>항목</span>
                  <select id="categorySelect">
                    <option value="지각" data-points="1">지각</option>
                    <option value="복장 불량" data-points="1">복장 불량</option>
                    <option value="수업 방해" data-points="2">수업 방해</option>
                    <option value="무단 결석" data-points="3">무단 결석</option>
                    <option value="기타" data-points="1">기타</option>
                  </select>
                </label>
                <label>
                  <span>점수</span>
                  <input id="pointsInput" type="number" min="1" value="1" />
                </label>
                <label>
                  <span>사유</span>
                  <textarea id="reasonInput" rows="4" placeholder="상세 사유를 입력하세요."></textarea>
                </label>
                <button id="savePenaltyBtn" type="submit" class="btn primary">벌점 저장</button>
              </form>
              <div id="penaltyMessage" class="message hidden"></div>
            </div>

            <div class="card">
              <h2>벌점 이력</h2>
              <div id="historyList" class="history-list empty">학생을 선택하면 벌점 이력이 표시됩니다.</div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
