
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HIS System</title>
</head>
<body>

<h2>Detention System</h2>

<select id="student"></select>
<input id="points" type="number">
<button onclick="save()">Save</button>

<hr>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="common.js"></script>
<script src="teacher.js"></script>

<script>
let students={}, entries={};

async function load(){
  students = (await db.ref("students").once("value")).val()||{};
  entries = (await db.ref("entries").once("value")).val()||{};
  render();
}

function render(){
  student.innerHTML = Object.entries(students)
    .map(([k,v])=>`<option value="${k}">${v.name}</option>`).join("");

  list.innerHTML = Object.values(entries)
    .map(e=>`<div>${e.studentName} - ${e.points} (${e.status})</div>`).join("");
}

async function save(){
  const sid = student.value;
  const pts = Number(points.value);
  const s = students[sid];

  await addEntry({
    studentId:sid,
    studentName:s.name,
    points:pts
  });

  load();
}

load();
</script>

</body>
</html>
