
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;margin:10px}
.card{border:1px solid #ddd;padding:10px;margin-bottom:8px;border-radius:10px}
.btn{margin:2px;padding:6px 8px;border:none;border-radius:6px}
.confirm{background:#4CAF50;color:#fff}
.notice{background:#2196F3;color:#fff}
.recover{background:#FF9800;color:#fff}
</style>
</head>

<body>

<h2>Detention System v4</h2>

<input id=student placeholder="학생 이름 검색">
<datalist id=students></datalist>
<input id=points type=number placeholder="points">
<button onclick=save()>Save</button>

<h3>Workflow</h3>
<div id=list></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="common.js"></script>

<script>
let entries={}, recoveries={}, students={};

function loadStudents(){
 db.ref('students').once('value').then(s=>{
  students=s.val()||{};
  let html='';
  Object.values(students).forEach(st=>{
    html+=`<option value="${st.name}">`;
  });
  document.getElementById('students').innerHTML=html;
 });
}

function save(){
 let id=uid();
 db.ref('detentionEntries/'+id).set({
  studentId:student.value,
  points:Number(points.value),
  status:'pending',
  createdAt:new Date().toISOString()
 });
}

function confirm(id){
 db.ref('detentionEntries/'+id).update({
  status:'confirmed',
  confirmedAt:new Date().toISOString()
 });
}

function sendNotice(id){
 let e=entries[id];

 // 자동 이메일 (메일 링크 + 기록)
 let mail="mailto:?subject=Detention Notice&body="+encodeURIComponent(
   e.studentId+" 학생 디텐션 발생"
 );

 window.open(mail);

 db.ref('detentionNotices/'+uid()).set({
  studentId:e.studentId,
  entryId:id,
  sentAt:new Date().toISOString()
 });
}

function recover(id){
 let e=entries[id];
 db.ref('recoveryEntries/'+uid()).set({
  studentId:e.studentId,
  points:3,
  completedAt:new Date().toISOString()
 });
}

function render(){
 let html='';
 Object.entries(entries).forEach(([k,v])=>{
  let total=calcTotal(v.studentId,entries,recoveries);

  html+=`
  <div class="card">
   <b>${v.studentId}</b><br>
   점수: ${v.points} / 상태: ${v.status}<br>
   현재누적: ${total}<br>

   <button class="btn confirm" onclick="confirm('${k}')">확정</button>
   <button class="btn notice" onclick="sendNotice('${k}')">알림</button>
   <button class="btn recover" onclick="recover('${k}')">회복</button>
  </div>
  `;
 });
 list.innerHTML=html;
}

db.ref('detentionEntries').on('value',s=>{
 entries=s.val()||{};
 render();
});

db.ref('recoveryEntries').on('value',s=>{
 recoveries=s.val()||{};
 render();
});

loadStudents();

</script>
</body>
</html>
