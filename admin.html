
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{font-family:sans-serif;background:#f5f7fb;padding:20px;}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;}
</style>
</head>
<body>

<div class="card">
<h3>교사 추가</h3>
<input id="t_name" placeholder="이름">
<input id="t_email" placeholder="이메일">
<input id="t_pw" placeholder="비밀번호">
<button onclick="addTeacher()">추가</button>
</div>

<div class="card">
<h3>학생 추가</h3>
<input id="s_name" placeholder="이름">
<input id="s_class" placeholder="반">
<button onclick="addStudent()">추가</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="common.js"></script>
<script src="db.js"></script>
<script src="admin.js"></script>

<script>
async function addTeacher(){
  await saveTeacher({
    name:t_name.value,
    email:t_email.value,
    password:t_pw.value
  });
  alert("완료");
}

async function addStudent(){
  await saveStudent({
    name:s_name.value,
    className:s_class.value
  });
  alert("완료");
}
</script>

</body>
</html>
