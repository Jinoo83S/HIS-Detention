<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>관리자 페이지</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="common.css" />
</head>

<body>
  <div id="toast"></div>

  <!-- ================= 로그인 화면 ================= -->
  <div id="login-screen" class="login-page">
    <div class="login-box">
      <div class="icon">⚙️</div>

      <h1 style="text-align:center">관리자 페이지</h1>
      <p style="text-align:center">학생, 교사, 벌점 데이터를 관리합니다.</p>

      <div class="grid">
        <div>
          <label class="label">관리자 비밀번호</label>
          <input id="admin-pw" type="password" class="edit-input"
            placeholder="비밀번호"
            onkeydown="if(event.key==='Enter') checkAdmin()" />
        </div>

        <button class="btn btn-primary" onclick="checkAdmin()">로그인</button>

        <a href="index.html" style="text-align:center;color:var(--sb);text-decoration:none">
          ← 교사 로그인으로
        </a>
      </div>
    </div>
  </div>

  <!-- ================= 관리자 화면 ================= -->
  <div id="admin-screen" class="hidden">
    <div class="topbar">
      <div>
        <h1>관리자 페이지</h1>
        <div class="sub">학생, 교사, 권한을 관리합니다.</div>
      </div>

      <div class="inline-actions">
        <button class="btn btn-secondary" onclick="refreshAll()">새로고침</button>
        <button class="btn btn-danger" onclick="adminLogout()">로그아웃</button>
      </div>
    </div>

    <div class="content">

      <!-- 탭 -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="teachers">교사 계정 관리</button>
        <button class="tab-btn" data-tab="students">학생 명단 관리</button>
        <button class="tab-btn" data-tab="records">벌점 기록 관리</button>
        <button class="tab-btn" data-tab="uploads">CSV 업로드</button>
      </div>

      <!-- ================= 교사 관리 ================= -->
      <div id="tab-teachers" class="tab-panel active">
        <div class="card">
          <div class="card-title">교사 계정 관리</div>

          <div class="filter-bar">
            <input id="teacher-search" class="edit-input flex1" placeholder="교사명/이메일/학반 검색">
            <button class="btn btn-secondary" onclick="addTeacherRow()">행 추가</button>
            <button class="btn btn-primary" onclick="saveTeachers()">변경 저장</button>
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>이전 ID</th><th>상태</th><th>이름</th><th>이메일</th>
                  <th>비밀번호</th><th>권한</th><th>담당학반</th><th>활성</th><th>삭제</th>
                </tr>
              </thead>
              <tbody id="teacher-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ================= 학생 관리 ================= -->
      <div id="tab-students" class="tab-panel">
        <div class="card">
          <div class="card-title">학생 명단 관리</div>

          <div class="filter-bar">
            <input id="student-search" class="edit-input flex1" placeholder="학생명/영문명/학반 검색">
            <button class="btn btn-secondary" onclick="addStudentRow()">행 추가</button>
            <button class="btn btn-primary" onclick="saveStudents()">변경 저장</button>
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>이전 ID</th><th>학생 이름</th><th>영문 이름</th>
                  <th>학반</th><th>저장 상태</th><th>삭제</th>
                </tr>
              </thead>
              <tbody id="student-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ================= 기록 관리 ================= -->
      <div id="tab-records" class="tab-panel">
        <div class="card">
          <div class="card-title">벌점 기록 관리</div>

          <div class="filter-bar">
            <input id="record-search" class="edit-input flex1" placeholder="학생명/교사명/학반 검색">
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>학생</th><th>영문 이름</th><th>학반</th><th>교사</th>
                  <th>권한</th><th>항목</th><th>점수</th><th>사유</th>
                  <th>일시</th><th>상태</th><th>취소</th>
                </tr>
              </thead>
              <tbody id="record-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ================= CSV 업로드 ================= -->
      <div id="tab-uploads" class="tab-panel">
        <div class="card">
          <div class="card-title">학생 명단 CSV 업로드</div>
          <div class="notice">CSV 첫 줄: name,englishName,className</div>

          <div class="filter-bar">
            <select id="student-csv-enc" class="edit-input">
              <option value="utf-8">UTF-8</option>
              <option value="euc-kr">EUC-KR</option>
            </select>
            <input id="student-csv" type="file" accept=".csv">
            <button class="btn btn-primary" onclick="uploadStudentsCsv()">업로드</button>
          </div>

          <div id="student-upload-msg" class="small"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= Firebase ================= -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="common.js"></script>

  <script>
    /* ================= 기본 상태 ================= */
    const ADMIN_PW = '1751';

    let teachersRaw = {};
    let studentsRaw = {};
    let recordsRaw = {};

    let teacherRows = [];
    let studentRows = [];

    /* ================= 로그인 ================= */
    function checkAdmin() {
      const pw = document.getElementById('admin-pw').value;

      if (pw !== ADMIN_PW) {
        document.getElementById('admin-pw').value = '';
        return toast('비밀번호가 올바르지 않습니다.', 'err');
      }

      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('admin-screen').classList.remove('hidden');

      refreshAll();
    }

    function adminLogout() {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('admin-screen').classList.add('hidden');
      document.getElementById('admin-pw').value = '';
    }

    /* ================= 데이터 로드 ================= */
    async function refreshAll() {
      try {
        const [t, s, r] = await Promise.all([
          db.ref('teachers').once('value'),
          db.ref('students').once('value'),
          db.ref('detentionRecords').once('value')
        ]);

        teachersRaw = t.val() || {};
        studentsRaw = s.val() || {};
        recordsRaw = r.val() || {};

        teacherRows = Object.entries(teachersRaw).map(([k, v]) => ({
          oldKey: k, ...v, _delete: false, _status: '기존'
        }));

        studentRows = Object.entries(studentsRaw).map(([k, v]) => ({
          oldKey: k, ...v, _delete: false, _status: '기존'
        }));

        renderTeachers();
        renderStudents();
        renderRecords();

      } catch (e) {
        console.error(e);
        toast('데이터 로드 실패', 'err');
      }
    }

    /* ================= 학생 저장 ================= */
    async function saveStudents() {
      try {
        const next = {};

        studentRows.forEach(r => {
          if (r._delete) return;

          const key = studentKey(r.name);

          if (!key || !r.name) {
            r._status = '오류';
            return;
          }

          next[key] = {
            name: r.name.trim(),
            englishName: (r.englishName || '').trim(),
            className: (r.className || '').trim(),
            updatedAt: new Date().toISOString()
          };

          r._status = '저장됨';
          r.oldKey = key;
        });

        await db.ref('students').set(next);

        toast('학생 데이터가 저장되었습니다.', 'ok');
        refreshAll();

      } catch (e) {
        console.error(e);
        toast('학생 데이터 저장 실패', 'err');
      }
    }

    /* ================= 탭 전환 ================= */
    document.addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  </script>
</body>
</html>
