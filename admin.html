<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>관리자 페이지</title>

  <link rel="stylesheet" href="common.css">
</head>

<body>

<h2>관리자 페이지</h2>

<button onclick="logoutTeacher()">로그아웃</button>

<hr>

<h3>학생 일괄 업로드 (엑셀 복사 붙여넣기)</h3>

<textarea id="student-bulk" rows="10" style="width:100%;" placeholder="이름,학급"></textarea>

<br><br>
<button onclick="uploadStudents()">학생 업로드</button>

<hr>

<h3>교사 추가</h3>

<input id="t-name" placeholder="이름">
<input id="t-email" placeholder="이메일">
<input id="t-pw" placeholder="비밀번호">

<button onclick="addTeacher()">교사 추가</button>

<hr>

<h3>현재 교사 목록</h3>
<ul id="teacher-list"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/common.js"></script>

<script>

let teachers = {};

// 초기화
function init(){
  const user = requireTeacherSession();
  if (!user) return;

  if (!user.roles || !user.roles.includes("master")) {
    alert("관리자 권한 필요");
    location.href = "teacher.html";
    return;
  }

  loadTeachers();
}

// =============================
// 학생 업로드
// =============================
async function uploadStudents(){

  const text = document.getElementById('student-bulk').value.trim();

  if (!text) return alert("데이터 없음");

  const lines = text.split('\n');

  const updates = {};

  lines.forEach(line => {

    const [name, className] = line.split(',').map(v => v.trim());

    if (!name) return;

    const key = studentKey(name, className);

    updates[key] = {
      name,
      className: className || ''
    };
  });

  await db.ref('students').update(updates);

  alert("학생 업로드 완료");
}

// =============================
// 교사 추가
// =============================
async function addTeacher(){

  const name = document.getElementById('t-name').value.trim();
  const email = document.getElementById('t-email').value.trim().toLowerCase();
  const password = document.getElementById('t-pw').value.trim();

  if (!name || !email || !password) {
    return alert("모두 입력");
  }

  const key = teacherKey(email, name);

  await db.ref(`teachers/${key}`).set({
    name,
    email,
    password,
    roles: [],
    active: true
  });

  alert("교사 추가 완료");

  loadTeachers();
}

// =============================
// 교사 목록
// =============================
async function loadTeachers(){

  const snap = await db.ref('teachers').once('value');
  teachers = snap.val() || {};

  renderTeachers();
}

function renderTeachers(){

  const el = document.getElementById('teacher-list');

  el.innerHTML = Object.values(teachers).map(t => `
    <li>${t.name} (${t.email})</li>
  `).join('');
}

init();

</script>

</body>
</html>
